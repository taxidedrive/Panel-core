<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>옵션 사이클 대시보드 v3.1</title>
  <style>
    :root{
      --bg:#06122f;
      --panel:#0d1b47;
      --line:#29408f;
      --text:#eef3ff;
      --muted:#b8c4ee;
      --green:#34d26a;
      --red:#ff6b6b;
      --btn:#274ecf;
      --btn2:#1a2e78;
      --input:#0a163b;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:radial-gradient(circle at top,#08205d 0%,var(--bg) 45%,#030a1a 100%);color:var(--text)}
    .wrap{max-width:880px;margin:0 auto;padding:20px}
    h1{font-size:44px;line-height:1.1;margin:12px 0 10px;font-weight:800}
    .sub{font-size:18px;color:var(--muted);margin-bottom:18px}
    .card{background:rgba(13,27,71,.96);border:1px solid var(--line);border-radius:28px;padding:22px;margin-bottom:18px;box-shadow:0 8px 30px rgba(0,0,0,.25)}
    .section-title{font-size:26px;font-weight:800;margin:0 0 16px}
    .actions{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:14px}
    button{border:none;border-radius:22px;padding:16px 20px;font-size:18px;color:#fff;background:var(--btn);cursor:pointer}
    button.secondary{background:transparent;border:1px solid var(--line);color:var(--text)}
    button.small{padding:10px 14px;font-size:15px;border-radius:16px;background:var(--btn2)}
    .hint{color:var(--muted);font-size:17px;line-height:1.5}
    .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
    .kpi .label{font-size:18px;color:var(--muted);margin-bottom:14px}
    .kpi .value{font-size:34px;font-weight:800}
    .green{color:var(--green)}
    .red{color:var(--red)}
    .group{background:rgba(9,18,48,.9);border:1px solid var(--line);border-radius:22px;padding:16px;margin:14px 0}
    .group-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
    .group-title{font-size:24px;font-weight:800}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .field label{display:block;font-size:15px;color:var(--muted);margin:0 0 8px}
    .field input,.field select{width:100%;background:var(--input);color:var(--text);border:1px solid var(--line);border-radius:16px;padding:14px 14px;font-size:20px}
    .table{width:100%;border-collapse:collapse;margin-top:12px}
    .table th,.table td{padding:12px 8px;border-bottom:1px solid rgba(112,139,230,.25);text-align:left;font-size:18px}
    .table th{color:var(--muted);font-size:16px}
    @media (max-width:700px){
      .wrap{padding:14px}
      h1{font-size:34px}
      .kpis,.grid{grid-template-columns:1fr}
      .table th,.table td{font-size:15px;padding:10px 6px}
      button{font-size:16px;padding:14px 16px}
      .group-title{font-size:20px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>옵션 사이클 대시보드 v3.1</h1>
    <div class="sub">고정본 · 수동 입력 · 추가/삭제 버튼 다시 연결 · 저장 가능</div>

    <div class="card">
      <div class="section-title">빠른 작업</div>
      <div class="actions">
        <button onclick="saveData()">현재 입력값 저장</button>
        <button onclick="addPosition()">포지션 추가</button>
        <button onclick="addContract()">계약 추가</button>
        <button onclick="addIncomeRow()">누적행 추가</button>
        <button class="secondary" onclick="resetSample()">샘플값 복원</button>
      </div>
      <div class="hint">현재가, 평단, 주식수, 누적 프리미엄, 계약, 누적행을 직접 바꾸면 아래 숫자가 즉시 다시 계산됩니다.</div>
    </div>

    <div class="kpis">
      <div class="card kpi"><div class="label">대표 현재가</div><div id="heroPrice" class="value">-</div></div>
      <div class="card kpi"><div class="label">총 누적 프리미엄</div><div id="totalPremium" class="value green">-</div></div>
      <div class="card kpi"><div class="label">현재 주식 평가손익</div><div id="stockPnL" class="value">-</div></div>
      <div class="card kpi"><div class="label">현재 총 평가값</div><div id="totalValue" class="value">-</div></div>
    </div>

    <div class="card">
      <div class="section-title">포지션 입력</div>
      <div id="positions"></div>
    </div>

    <div class="card">
      <div class="section-title">옵션 계약 입력</div>
      <div id="contracts"></div>
    </div>

    <div class="card">
      <div class="section-title">누적 수익 입력</div>
      <div id="incomes"></div>
    </div>

    <div class="card">
      <div class="section-title">요약 표</div>
      <table class="table" id="summaryTable">
        <thead><tr><th>티커</th><th>주식수</th><th>평단</th><th>현재가</th><th>주식손익</th><th>누적 프리미엄</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

<script>
const SAMPLE = {
  positions:[
    {ticker:'SOFI', shares:15000, avgCost:17.20, currentPrice:16.50, premium:18500},
    {ticker:'UNH', shares:2000, avgCost:270.00, currentPrice:277.00, premium:44369}
  ],
  contracts:[
    {ticker:'SOFI', type:'CC', expiry:'2026-04-10', strike:16, contracts:150, premium:7500},
    {ticker:'UNH', type:'CC', expiry:'2026-05-01', strike:265, contracts:20, premium:44369}
  ],
  incomes:[
    {label:'1차', amount:9500},
    {label:'2차', amount:8000},
    {label:'3차', amount:10000}
  ]
};
let state = loadData();

function loadData(){
  try{
    const raw = localStorage.getItem('options_dashboard_v31');
    return raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(SAMPLE));
  }catch(e){
    return JSON.parse(JSON.stringify(SAMPLE));
  }
}
function saveData(){
  syncStateFromInputs();
  localStorage.setItem('options_dashboard_v31', JSON.stringify(state));
  alert('저장되었습니다.');
}
function resetSample(){
  state = JSON.parse(JSON.stringify(SAMPLE));
  localStorage.removeItem('options_dashboard_v31');
  renderAll();
}
function money(n){
  const sign = n >= 0 ? '+' : '-';
  return `${sign}$${Math.abs(Number(n)||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`;
}
function num(v){ return Number(v)||0; }

function renderAll(){
  renderPositions();
  renderContracts();
  renderIncomes();
  recalc();
}

function renderPositions(){
  const box = document.getElementById('positions');
  box.innerHTML = '';
  state.positions.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'group';
    div.innerHTML = `
      <div class="group-head">
        <div class="group-title">${i+1}. 포지션</div>
        <button class="small" onclick="removePosition(${i})">삭제</button>
      </div>
      <div class="grid">
        <div class="field"><label>티커</label><input data-kind="position" data-index="${i}" data-key="ticker" value="${p.ticker}"></div>
        <div class="field"><label>주식수</label><input type="number" step="1" data-kind="position" data-index="${i}" data-key="shares" value="${p.shares}"></div>
        <div class="field"><label>평단</label><input type="number" step="0.01" data-kind="position" data-index="${i}" data-key="avgCost" value="${p.avgCost}"></div>
        <div class="field"><label>현재가</label><input type="number" step="0.01" data-kind="position" data-index="${i}" data-key="currentPrice" value="${p.currentPrice}"></div>
        <div class="field"><label>누적 프리미엄</label><input type="number" step="0.01" data-kind="position" data-index="${i}" data-key="premium" value="${p.premium}"></div>
      </div>`;
    box.appendChild(div);
  });
  bindInputs();
}

function renderContracts(){
  const box = document.getElementById('contracts');
  box.innerHTML = '';
  state.contracts.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'group';
    div.innerHTML = `
      <div class="group-head">
        <div class="group-title">${i+1}. 계약</div>
        <button class="small" onclick="removeContract(${i})">삭제</button>
      </div>
      <div class="grid">
        <div class="field"><label>티커</label><input data-kind="contract" data-index="${i}" data-key="ticker" value="${c.ticker}"></div>
        <div class="field"><label>종류</label>
          <select data-kind="contract" data-index="${i}" data-key="type">
            <option ${c.type==='CC'?'selected':''}>CC</option>
            <option ${c.type==='PUT'?'selected':''}>PUT</option>
            <option ${c.type==='CALL'?'selected':''}>CALL</option>
          </select>
        </div>
        <div class="field"><label>만기</label><input data-kind="contract" data-index="${i}" data-key="expiry" value="${c.expiry}"></div>
        <div class="field"><label>행사가</label><input type="number" step="0.01" data-kind="contract" data-index="${i}" data-key="strike" value="${c.strike}"></div>
        <div class="field"><label>계약수</label><input type="number" step="1" data-kind="contract" data-index="${i}" data-key="contracts" value="${c.contracts}"></div>
        <div class="field"><label>프리미엄</label><input type="number" step="0.01" data-kind="contract" data-index="${i}" data-key="premium" value="${c.premium}"></div>
      </div>`;
    box.appendChild(div);
  });
  bindInputs();
}

function renderIncomes(){
  const box = document.getElementById('incomes');
  box.innerHTML = '';
  state.incomes.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'group';
    div.innerHTML = `
      <div class="group-head">
        <div class="group-title">${i+1}. 누적행</div>
        <button class="small" onclick="removeIncomeRow(${i})">삭제</button>
      </div>
      <div class="grid">
        <div class="field"><label>이름</label><input data-kind="income" data-index="${i}" data-key="label" value="${r.label}"></div>
        <div class="field"><label>금액</label><input type="number" step="0.01" data-kind="income" data-index="${i}" data-key="amount" value="${r.amount}"></div>
      </div>`;
    box.appendChild(div);
  });
  bindInputs();
}

function bindInputs(){
  document.querySelectorAll('input[data-kind],select[data-kind]').forEach(el => {
    el.oninput = () => { syncStateFromInputs(); recalc(); };
    el.onchange = () => { syncStateFromInputs(); recalc(); };
  });
}

function syncStateFromInputs(){
  document.querySelectorAll('[data-kind="position"]').forEach(el => {
    const i = +el.dataset.index; const key = el.dataset.key;
    state.positions[i][key] = ['ticker'].includes(key) ? el.value : num(el.value);
  });
  document.querySelectorAll('[data-kind="contract"]').forEach(el => {
    const i = +el.dataset.index; const key = el.dataset.key;
    state.contracts[i][key] = ['ticker','type','expiry'].includes(key) ? el.value : num(el.value);
  });
  document.querySelectorAll('[data-kind="income"]').forEach(el => {
    const i = +el.dataset.index; const key = el.dataset.key;
    state.incomes[i][key] = key === 'label' ? el.value : num(el.value);
  });
}

function addPosition(){
  state.positions.push({ticker:'NEW', shares:0, avgCost:0, currentPrice:0, premium:0});
  renderAll();
}
function removePosition(i){ state.positions.splice(i,1); renderAll(); }
function addContract(){
  state.contracts.push({ticker:'NEW', type:'CC', expiry:'2026-04-10', strike:0, contracts:0, premium:0});
  renderAll();
}
function removeContract(i){ state.contracts.splice(i,1); renderAll(); }
function addIncomeRow(){
  state.incomes.push({label:'새 행', amount:0});
  renderAll();
}
function removeIncomeRow(i){ state.incomes.splice(i,1); renderAll(); }

function recalc(){
  syncStateFromInputs();
  const totalPremium = state.positions.reduce((s,p)=>s+num(p.premium),0);
  const stockPnL = state.positions.reduce((s,p)=>s+(num(p.currentPrice)-num(p.avgCost))*num(p.shares),0);
  const totalValue = totalPremium + stockPnL;
  const hero = state.positions[0] ? `${state.positions[0].ticker} $${num(state.positions[0].currentPrice).toFixed(2)}` : '-';
  document.getElementById('heroPrice').textContent = hero;
  document.getElementById('totalPremium').textContent = money(totalPremium);
  const stockEl = document.getElementById('stockPnL');
  stockEl.textContent = money(stockPnL);
  stockEl.className = 'value ' + (stockPnL >= 0 ? 'green' : 'red');
  const totalEl = document.getElementById('totalValue');
  totalEl.textContent = money(totalValue);
  totalEl.className = 'value ' + (totalValue >= 0 ? 'green' : 'red');

  const tbody = document.querySelector('#summaryTable tbody');
  tbody.innerHTML = '';
  state.positions.forEach(p => {
    const pnl = (num(p.currentPrice)-num(p.avgCost))*num(p.shares);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${p.ticker}</td>
      <td>${num(p.shares).toLocaleString()}</td>
      <td>$${num(p.avgCost).toFixed(2)}</td>
      <td>$${num(p.currentPrice).toFixed(2)}</td>
      <td class="${pnl>=0?'green':'red'}">${money(pnl)}</td>
      <td class="green">${money(num(p.premium))}</td>`;
    tbody.appendChild(tr);
  });
}

renderAll();
</script>
</body>
</html>
